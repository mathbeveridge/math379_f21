<body><div class="solution solution-like">
<p>We have \(t_0=0\) since there are no surjections from the empty set \(\emptyset\) to \([1]\text{.}\) For \(n \geq 1\text{,}\) there is one (surjective) function from \([n]\) to \([1]\text{.}\) So</p>
<div xmlns:svg="http://www.w3.org/2000/svg" class="displaymath">
\begin{equation*}
T(x) = \sum_{n=1}{\infty} \frac{x^n}{n!} = e^x -1.
\end{equation*}
